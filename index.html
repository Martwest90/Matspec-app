<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Materiellspesifikasjon – Moodgruppen</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --mood-dark: #2F2B2B; --mood-body: #555555; --mood-secondary: #777777;
  --mood-decor: #BFBFBF; --mood-accent1: #585FFF; --mood-accent2: #2CC6D0;
  --mood-accent3: #FEA528; --mood-accent4: #00C17C; --mood-bg: #F7F7F7;
  --border: #e0e0e0; --white: #ffffff; --radius: 10px; --radius-sm: 6px;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f7f7f5; color: var(--mood-dark); font-size: 14px; line-height: 1.6; min-height: 100vh; }
header { background: var(--white); border-bottom: 1px solid var(--border); padding: 14px 32px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; }
.logo-mark { width: 32px; height: 32px; background: var(--mood-accent1); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 14px; }
.header-title { font-size: 15px; font-weight: 600; }
.header-sub { font-size: 12px; color: var(--mood-secondary); margin-left: auto; }
.main { max-width: 900px; margin: 0 auto; padding: 28px 24px; }
.section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--mood-secondary); margin-bottom: 10px; }
.card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
label { display: block; font-size: 12px; color: var(--mood-secondary); margin-bottom: 5px; font-weight: 500; }
input { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-family: inherit; background: var(--white); color: var(--mood-dark); outline: none; transition: border-color 0.15s; }
input:focus { border-color: var(--mood-accent1); }

/* ── KANALTRE ─── */
.tree-category { margin-bottom: 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
.tree-cat-header { display: flex; align-items: center; gap: 10px; padding: 11px 14px; background: var(--mood-bg); cursor: pointer; user-select: none; font-weight: 600; font-size: 13px; }
.tree-cat-header:hover { background: #eeeeff; }
.tree-cat-icon { font-size: 16px; }
.tree-cat-arrow { margin-left: auto; font-size: 11px; color: var(--mood-secondary); transition: transform 0.2s; }
.tree-cat-arrow.open { transform: rotate(90deg); }
.tree-level2 { border-top: 1px solid var(--border); display: none; }
.tree-level2.open { display: block; }
.tree-sub-header { display: flex; align-items: center; gap: 8px; padding: 9px 14px 9px 28px; cursor: pointer; font-size: 13px; font-weight: 500; background: var(--white); border-bottom: 1px solid #f0f0f0; user-select: none; }
.tree-sub-header:hover { background: #f9f9ff; }
.tree-sub-arrow { margin-left: auto; font-size: 10px; color: var(--mood-secondary); transition: transform 0.2s; }
.tree-sub-arrow.open { transform: rotate(90deg); }
.tree-formats { display: none; border-top: 1px solid #f0f0f0; }
.tree-formats.open { display: block; }
.format-row { display: flex; align-items: center; gap: 10px; padding: 8px 14px 8px 44px; border-bottom: 1px solid #f8f8f8; cursor: pointer; user-select: none; }
.format-row:hover { background: #f5f5ff; }
.format-row:last-child { border-bottom: none; }
.format-checkbox { width: 16px; height: 16px; border: 1.5px solid var(--border); border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.12s; }
.format-checkbox.checked { background: var(--mood-accent1); border-color: var(--mood-accent1); color: white; font-size: 10px; }
.format-name { font-size: 13px; color: var(--mood-dark); }
.format-sub { font-size: 11px; color: var(--mood-secondary); margin-left: auto; }
.format-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ── SELECTED CONFIGS ─── */
.config-block { border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; margin-bottom: 10px; }
.config-head { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--mood-bg); border-bottom: 1px solid var(--border); }
.config-name { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.remove-btn { font-size: 11px; padding: 3px 9px; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; background: white; color: var(--mood-secondary); }
.remove-btn:hover { border-color: #E24B4A; color: #E24B4A; }
.config-body { padding: 12px 14px; }
.type-toggles { display: flex; gap: 7px; margin-bottom: 10px; }
.type-btn { font-size: 12px; padding: 4px 12px; border: 1px solid var(--border); border-radius: 20px; cursor: pointer; background: white; color: var(--mood-secondary); transition: all 0.1s; }
.type-btn.on { background: var(--mood-accent1); border-color: var(--mood-accent1); color: white; }
.mini-row { display: flex; gap: 10px; flex-wrap: wrap; }
.mini-field { flex: 1; min-width: 110px; }
.mini-field label { font-size: 11px; }
.mini-field input { padding: 5px 9px; font-size: 13px; }

/* ── SEKUNDLENGDER ─── */
.duration-section { margin-top: 10px; }
.duration-label { font-size: 11px; color: var(--mood-secondary); font-weight: 500; margin-bottom: 7px; }
.duration-pills { display: flex; gap: 7px; flex-wrap: wrap; }
.dur-pill { width: 52px; height: 52px; border-radius: 50%; border: 2px solid var(--border); background: white; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; font-weight: 600; color: var(--mood-secondary); transition: all 0.12s; flex-direction: column; gap: 1px; }
.dur-pill:hover { border-color: var(--mood-accent1); color: var(--mood-accent1); }
.dur-pill.selected { border-color: var(--mood-accent1); background: var(--mood-accent1); color: white; }
.dur-pill .dur-num { font-size: 14px; font-weight: 700; line-height: 1; }
.dur-pill .dur-unit { font-size: 9px; font-weight: 400; opacity: 0.8; }
.dur-custom { margin-top: 8px; }
.dur-custom input { width: 180px; font-size: 12px; padding: 5px 9px; }

/* ── KNAPPER ─── */
.gen-btn { width: 100%; padding: 13px; background: var(--mood-accent1); color: white; border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.15s; margin-top: 4px; }
.gen-btn:hover { background: #3a41cc; }
.gen-btn:disabled { background: #ccc; cursor: not-allowed; }

/* ── PDF PREVIEW ─── */
.preview-wrap { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-top: 20px; }
.preview-bar { display: flex; align-items: center; justify-content: space-between; padding: 10px 18px; background: var(--mood-bg); border-bottom: 1px solid var(--border); }
.preview-label { font-size: 12px; color: var(--mood-secondary); font-weight: 500; }
.print-btn { display: flex; align-items: center; gap: 7px; padding: 7px 18px; background: var(--mood-accent1); color: white; border: none; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; }
.print-btn:hover { background: #3a41cc; }
.pdf { padding: 36px 40px; font-size: 13px; line-height: 1.65; }
.pdf-header { border-bottom: 3px solid var(--mood-accent1); padding-bottom: 16px; margin-bottom: 26px; display: flex; justify-content: space-between; align-items: flex-start; }
.pdf-title { font-size: 22px; font-weight: 700; color: #2F2B2B; letter-spacing: -0.3px; }
.pdf-sub { font-size: 13px; color: #777777; margin-top: 2px; }
.deadline-badge { display: inline-block; background: #FFF3E0; color: #2F2B2B; border: 1px solid #FEA528; border-radius: 4px; padding: 2px 9px; font-size: 12px; font-weight: 600; margin-top: 4px; }
.pdf-meta { text-align: right; }
.pdf-meta-item { font-size: 12px; color: #777777; line-height: 1.9; }
.pdf-meta-item strong { color: #2F2B2B; }
.ch-block { margin-bottom: 24px; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
.ch-block-head { padding: 10px 16px; display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; border-bottom: 1px solid var(--border); }
.ch-block-sub { font-size: 12px; color: var(--mood-secondary); font-weight: 400; }
.ch-block-body { padding: 16px 18px; }
.spec-group { margin-bottom: 18px; }
.spec-group:last-child { margin-bottom: 0; }
.spec-group-title { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--mood-secondary); margin-bottom: 8px; padding-bottom: 5px; border-bottom: 1px solid var(--border); }
.spec-tbl { width: 100%; border-collapse: collapse; }
.spec-tbl td { padding: 4px 0; vertical-align: top; font-size: 13px; }
.spec-tbl td:first-child { color: #777777; width: 42%; padding-right: 12px; }
.spec-tbl td:last-child { font-weight: 500; color: #2F2B2B; }
.safezone-box { background: #EEEEFF; border-left: 3px solid var(--mood-accent1); padding: 8px 12px; border-radius: 0 4px 4px 0; font-size: 12px; color: #3a3a7a; margin-top: 8px; }
.safezone-box a { color: var(--mood-accent1); text-decoration: none; font-weight: 500; }
.duration-badge { display: inline-flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
.dur-badge-item { background: var(--mood-accent1); color: white; border-radius: 20px; padding: 2px 10px; font-size: 12px; font-weight: 600; }
.open-box { background: #FFF8EE; border: 1px solid var(--mood-accent3); border-radius: var(--radius-sm); padding: 14px 16px; margin-top: 24px; }
.open-box-title { font-size: 12px; font-weight: 700; color: var(--mood-dark); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.06em; }
.open-item { font-size: 12px; color: var(--mood-body); padding: 3px 0; display: flex; gap: 8px; }
.open-item::before { content: "→"; color: var(--mood-accent1); flex-shrink: 0; }
.pdf-footer { margin-top: 30px; padding-top: 12px; border-top: 2px dotted #BFBFBF; display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: #777777; }

/* ── BREADCRUMB ─── */
.breadcrumb { font-size: 11px; color: var(--mood-secondary); margin-bottom: 6px; }
.breadcrumb span { color: var(--mood-accent1); }

@media print {
  body { background: white; }
  header, .preview-bar, .main > *:not(.preview-wrap) { display: none !important; }
  .preview-wrap { border: none; margin: 0; }
  .pdf { padding: 20px; }
  .ch-block { break-inside: avoid; }
}
</style>
</head>

// ─── STATE ───────────────────────────────────────────────────────────────────
let sel = {};
let openCats = {};
let openSubs = {};

function upd() { renderConfigAndBtn(); }

function toggleCat(id) {
  openCats[id] = !openCats[id];
  renderTree();
}

function toggleSub(id) {
  openSubs[id] = !openSubs[id];
  renderTree();
}

function toggleFormat(id) {
  if (sel[id]) {
    delete sel[id];
  } else {
    const ch = CHANNELS[id];
    const defaultTypes = ch.hasAudio ? ['audio'] : ch.hasVideo ? ['video'] : ['image'];
    sel[id] = { types: defaultTypes, count:'', ordernr:'', durations:[], customDur:'', notes:'' };
  }
  renderTree();
  renderConfigAndBtn();
}

function toggleType(id, t) {
  const types = sel[id].types;
  const i = types.indexOf(t);
  if (i>=0) { if(types.length===1) return; sel[id].types = types.filter(x=>x!==t); }
  else sel[id].types = [...types, t];
  renderConfigAndBtn();
}

function toggleDur(id, d) {
  const durs = sel[id].durations;
  const i = durs.indexOf(d);
  if (i>=0) sel[id].durations = durs.filter(x=>x!==d);
  else sel[id].durations = [...durs, d].sort((a,b)=>a-b);
  renderConfigAndBtn();
}

function setCf(id, field, val) { sel[id][field]=val; renderConfigAndBtn(); }

// ─── RENDER TREE ─────────────────────────────────────────────────────────────
function formatRow(id) {
  const ch = CHANNELS[id];
  const isChecked = !!sel[id];
  const typeLabel = ch.hasAudio?'Lyd':ch.hasVideo&&ch.hasImage?'Bilde/Video':ch.hasVideo?'Video':'Bilde';
  return `
    <div class="format-row" onclick="toggleFormat('${id}')">
      <div class="format-checkbox ${isChecked?'checked':''}">  ${isChecked?'&#10003;':''}</div>
      <span class="format-dot" style="background:${ch.color}"></span>
      <span class="format-name">${ch.name}</span>
      <span class="format-sub">${typeLabel}</span>
    </div>`;
}

function countSelected(channels) {
  return channels.filter(id=>sel[id]).length;
}

function renderTree() {
  document.getElementById('tree').innerHTML = TREE.map(cat => {
    const catOpen = openCats[cat.id];
    const allChannels = cat.subs.flatMap(s=>s.channels);
    const catCount = countSelected(allChannels);

    // Regn ut om kategorien er "flat":
    // Flat = alle subs har kun 1 kanal, eller hele kategorien har bare 1 sub
    // I begge tilfeller viser vi kanalene direkte uten sub-header
    const isFlat = cat.subs.every(s => s.channels.length === 1);

    const innerContent = isFlat
      // FLAT: vis alle kanaler direkte under kategorien, ingen sub-header
      ? `<div class="tree-formats" style="display:block;border-top:1px solid #f0f0f0">
          ${allChannels.map(id => formatRow(id)).join('')}
        </div>`
      // FULL TRE: vis sub-headers med egne format-lister
      : cat.subs.map(sub => {
          const subOpen = openSubs[sub.id];
          const subCount = countSelected(sub.channels);
          const singleChannel = sub.channels.length === 1;

          // Sub med kun 1 kanal: vis direkte som en format-rad uten sub-header
          if (singleChannel) {
            return `<div style="border-bottom:1px solid #f8f8f8">
              ${formatRow(sub.channels[0])}
            </div>`;
          }

          // Sub med flere kanaler: vis sub-header + utfellbar liste
          return `
            <div class="tree-sub-header" onclick="toggleSub('${sub.id}')">
              <span>${sub.label}</span>
              ${subCount>0?`<span style="background:var(--mood-accent1);color:white;border-radius:10px;padding:1px 7px;font-size:10px;margin-left:6px">${subCount}</span>`:''}
              <span class="tree-sub-arrow ${subOpen?'open':''}">▶</span>
            </div>
            <div class="tree-formats ${subOpen?'open':''}">
              ${sub.channels.map(id => formatRow(id)).join('')}
            </div>`;
        }).join('');

    return `
      <div class="tree-category">
        <div class="tree-cat-header" onclick="toggleCat('${cat.id}')">
          <span class="tree-cat-icon">${cat.icon}</span>
          <span>${cat.label}</span>
          ${catCount>0?`<span style="margin-left:8px;background:var(--mood-accent1);color:white;border-radius:10px;padding:1px 8px;font-size:11px">${catCount}</span>`:''}
          <span class="tree-cat-arrow ${catOpen?'open':''}">▶</span>
        </div>
        <div class="tree-level2 ${catOpen?'open':''}">
          ${innerContent}
        </div>
      </div>`;
  }).join('');
}

// ─── RENDER CONFIG ────────────────────────────────────────────────────────────
function renderConfigAndBtn() {
  const ids = Object.keys(sel);
  const card = document.getElementById('config-card');
  const btn = document.getElementById('gen-btn');
  if (ids.length===0) { card.style.display='none'; btn.disabled=true; return; }
  card.style.display='block'; btn.disabled=false;

  document.getElementById('config-list').innerHTML = ids.map(id => {
    const ch = CHANNELS[id];
    const cfg = sel[id];
    const durationOptions = ch.durations || [];

    return `<div class="config-block">
      <div class="config-head">
        <div class="config-name">
          <span style="width:10px;height:10px;border-radius:50%;background:${ch.color};display:inline-block"></span>
          ${ch.name}
        </div>
        <button class="remove-btn" onclick="toggleFormat('${id}')">Fjern</button>
      </div>
      <div class="config-body">
        ${ch.hasImage&&ch.hasVideo?`
          <div style="margin-bottom:10px">
            <label style="margin-bottom:6px">Kreativtype</label>
            <div class="type-toggles">
              <button class="type-btn ${cfg.types.includes('image')?'on':''}" onclick="toggleType('${id}','image')">Bilde</button>
              <button class="type-btn ${cfg.types.includes('video')?'on':''}" onclick="toggleType('${id}','video')">Film / Video</button>
            </div>
          </div>`:''}

        ${durationOptions.length>0?`
          <div class="duration-section">
            <div class="duration-label">Sekundlengder (velg alle aktuelle)</div>
            <div class="duration-pills">
              ${durationOptions.map(d=>`
                <div class="dur-pill ${cfg.durations.includes(d)?'selected':''}" onclick="toggleDur('${id}',${d})">
                  <span class="dur-num">${d}</span>
                  <span class="dur-unit">sek</span>
                </div>`).join('')}
            </div>
            <div class="dur-custom" style="margin-top:8px">
              <input placeholder="Annen lengde, f.eks. 45 sek" value="${cfg.customDur||''}" oninput="setCf('${id}','customDur',this.value)" style="width:200px;font-size:12px;padding:5px 9px">
            </div>
          </div>`:''}

        <div class="mini-row" style="margin-top:10px">
          ${!ch.hasAudio?`<div class="mini-field"><label>Antall kreativer</label><input value="${cfg.count}" placeholder="f.eks. 3" oninput="setCf('${id}','count',this.value)"></div>`:''}
          ${ch.isBauer?`<div class="mini-field"><label>Ordrenummer</label><input value="${cfg.ordernr}" placeholder="Bauer-ordrenr." oninput="setCf('${id}','ordernr',this.value)"></div>`:''}
          <div class="mini-field" style="flex:2"><label>Merknad</label><input value="${cfg.notes}" placeholder="Særlige krav, varianter..." oninput="setCf('${id}','notes',this.value)"></div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ─── BUILD PDF ────────────────────────────────────────────────────────────────
function specRows(obj) {
  return Object.entries(obj).map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
}

function now() {
  return new Date().toLocaleDateString('nb-NO',{day:'2-digit',month:'long',year:'numeric'});
}

function getOpenItems() {
  const items = [];
  const ids = Object.keys(sel);
  if (ids.includes('meta-video')||ids.includes('meta-bilde')) items.push('Meta: Bekreft antall kreativer per format (min 3 anbefalt for Advantage+)');
  ids.filter(id=>CHANNELS[id].isBauer).forEach(id=>{ if(!sel[id].ordernr) items.push(`${CHANNELS[id].name}: Ordrenummer mangler – påkrevd for direkteleveranse`); });
  if (ids.includes('display')) items.push('Display: Avklar om mp4 leveres via 3. part, og om fallback er jpg eller mp4');
  if (ids.includes('vgtv')) items.push('VGTV: Bekreft at VAST-tag er satt opp uten VPAID');
  if (ids.includes('azerion')) items.push('Azerion: Velg leveringsmetode – VAST-tag eller videofil + click URL');
  if (ids.some(id=>['meta-bilde','meta-video','tiktok','snapchat-bilde','snapchat-video'].includes(id))) items.push('Postetekster: Avklar hvem som leverer tekster – Moodgruppen eller klient');
  return items;
}

function buildPDF() {
  const ids = Object.keys(sel);
  const client = document.getElementById('f-client').value;
  const campaign = document.getElementById('f-campaign').value;
  const deadline = document.getElementById('f-deadline').value;
  const agency = document.getElementById('f-agency').value;
  const contact = document.getElementById('f-contact').value;

  const blocks = ids.map(id => {
    const ch = CHANNELS[id];
    const cfg = sel[id];
    let sections = '';

    const allTypes = cfg.types.length ? cfg.types : (ch.hasAudio?['audio']:ch.hasVideo?['video']:['image']);
    allTypes.forEach(t => {
      const specs = ch.specs[t];
      if (!specs) return;
      const label = t==='image'?'Bilde':t==='audio'?'Lyd / Audio':'Film / Video';
      sections += `
        <div class="spec-group">
          <div class="spec-group-title">${label}</div>
          <table class="spec-tbl">
            ${specRows(specs)}
            ${cfg.count?`<tr><td>Antall kreativer</td><td>${cfg.count}</td></tr>`:''}
          </table>
          ${ch.safezones&&ch.safezones[t]?`
          <div class="safezone-box">
            <strong>Safezone:</strong> ${ch.safezones[t]}
            ${ch.safezones.link?` &nbsp;→ <a href="${ch.safezones.link}" target="_blank">${ch.safezones.label}</a>`:''}
          </div>`:''}
        </div>`;
    });

    // Sekundlengder
    const durList = [...cfg.durations];
    if (cfg.customDur) durList.push(cfg.customDur);
    if (durList.length>0) {
      sections += `
        <div class="spec-group">
          <div class="spec-group-title">Sekundlengder</div>
          <div class="duration-badge">
            ${durList.map(d=>`<span class="dur-badge-item">${typeof d==='number'?d+' sek':d}</span>`).join('')}
          </div>
        </div>`;
    }

    if (ch.postetekst) {
      sections += `
        <div class="spec-group">
          <div class="spec-group-title">Postetekst</div>
          <table class="spec-tbl">${specRows(ch.postetekst)}</table>
        </div>`;
    }

    const leveranseVal = ch.isBauer&&cfg.ordernr ? `${ch.leveranse}<br><strong>Ordrenummer: ${cfg.ordernr}</strong>` : ch.leveranse;
    sections += `
      <div class="spec-group">
        <div class="spec-group-title">Leveranse</div>
        <table class="spec-tbl">
          <tr><td>Leveres til</td><td>${leveranseVal}</td></tr>
          ${deadline?`<tr><td>Deadline</td><td style="color:#FEA528;font-weight:700">${deadline}</td></tr>`:''}
          ${cfg.notes?`<tr><td>Merknad</td><td>${cfg.notes}</td></tr>`:''}
          ${ch.specLink?`<tr><td>Offisiell spec</td><td><a href="${ch.specLink}" target="_blank" style="color:#585FFF">${ch.specLink}</a></td></tr>`:''}
        </table>
      </div>`;

    return `
      <div class="ch-block">
        <div class="ch-block-head" style="background:${ch.color}15;border-left:3px solid ${ch.color}">
          <span style="width:11px;height:11px;border-radius:50%;background:${ch.color};display:inline-block"></span>
          ${ch.name}
          <span class="ch-block-sub">– ${ch.cat==='ooh'?'OOH/DOOH':ch.cat==='some'?'Sosiale medier':ch.cat==='onlinevideo'?'Online video':ch.cat}</span>
        </div>
        <div class="ch-block-body">${sections}</div>
      </div>`;
  }).join('');

  const openItems = getOpenItems();
  return `
    <div class="pdf">
      <div class="pdf-header">
        <div>
          <div class="pdf-title">Materiellspesifikasjon</div>
          <div class="pdf-sub">${campaign||'–'}</div>
          ${deadline?`<div class="deadline-badge">Deadline: ${deadline}</div>`:''}
        </div>
        <div class="pdf-meta">
          ${client?`<div class="pdf-meta-item"><strong>Klient:</strong> ${client}</div>`:''}
          ${agency?`<div class="pdf-meta-item"><strong>Til:</strong> ${agency}</div>`:''}
          ${contact?`<div class="pdf-meta-item"><strong>Kontakt:</strong> ${contact}</div>`:''}
          <div class="pdf-meta-item"><strong>Fra:</strong> Moodgruppen</div>
          <div class="pdf-meta-item">${now()}</div>
        </div>
      </div>
      ${blocks}
      ${openItems.length>0?`
      <div class="open-box">
        <div class="open-box-title">Åpne punkter for avklaring</div>
        ${openItems.map(i=>`<div class="open-item">${i}</div>`).join('')}
      </div>`:''}
      <div class="pdf-footer">
        <span style="font-weight:600;color:#585FFF;letter-spacing:0.04em">MOODGRUPPEN</span>
        <span>Materiellspesifikasjon · Safezones fra offisielle kilder · ${now()}</span>
      </div>
    </div>`;
}

function generate() {
  const area = document.getElementById('preview-area');
  area.innerHTML = `
    <div class="preview-wrap">
      <div class="preview-bar">
        <span class="preview-label">Forhåndsvisning</span>
        <button class="print-btn" onclick="window.print()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          Skriv ut / Lagre PDF
        </button>
      </div>
      ${buildPDF()}
    </div>`;
  area.scrollIntoView({behavior:'smooth', block:'start'});
}

// Init
renderTree();
</script>
