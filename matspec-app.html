<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Materiellspesifikasjon – Moodgruppen</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #0F6E56;
    --green-mid: #1D9E75;
    --green-light: #E1F5EE;
    --text: #1a1a1a;
    --text-muted: #666;
    --border: #e0e0e0;
    --bg: #f7f7f5;
    --white: #ffffff;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 14px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo-mark {
    width: 32px; height: 32px;
    background: var(--green);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 700; font-size: 14px;
    letter-spacing: -0.5px;
  }

  .header-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .header-sub { font-size: 12px; color: var(--text-muted); margin-left: auto; }

  .main { max-width: 900px; margin: 0 auto; padding: 28px 24px; }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

  label {
    display: block;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 5px;
    font-weight: 500;
  }

  input, select {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: inherit;
    background: var(--white);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus, select:focus { border-color: var(--green-mid); }

  .channel-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
    gap: 10px;
    margin-bottom: 4px;
  }

  .ch-card {
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px;
    cursor: pointer;
    transition: all 0.12s;
    background: var(--white);
    position: relative;
    user-select: none;
  }
  .ch-card:hover { border-color: #aaa; }
  .ch-card.active {
    border-color: var(--green-mid);
    background: var(--green-light);
  }

  .ch-dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; margin-right: 7px; }
  .ch-name { font-size: 13px; font-weight: 600; display: flex; align-items: center; }
  .ch-sub { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

  .ch-check {
    position: absolute; top: 7px; right: 7px;
    width: 17px; height: 17px; border-radius: 50%;
    background: var(--green-mid);
    color: white; font-size: 10px;
    display: none; align-items: center; justify-content: center;
  }
  .ch-card.active .ch-check { display: flex; }

  .config-block {
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
    margin-bottom: 10px;
  }

  .config-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px;
    background: #fafafa;
    border-bottom: 1px solid var(--border);
  }

  .config-name { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; }

  .remove-btn {
    font-size: 11px; padding: 3px 9px;
    border: 1px solid var(--border);
    border-radius: 4px; cursor: pointer;
    background: white; color: var(--text-muted);
  }
  .remove-btn:hover { border-color: #E24B4A; color: #E24B4A; }

  .config-body { padding: 12px 14px; }

  .type-toggles { display: flex; gap: 7px; margin-bottom: 10px; }
  .type-btn {
    font-size: 12px; padding: 4px 12px;
    border: 1px solid var(--border);
    border-radius: 20px; cursor: pointer;
    background: white; color: var(--text-muted);
    transition: all 0.1s;
  }
  .type-btn.on { background: var(--green-mid); border-color: var(--green-mid); color: white; }

  .mini-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .mini-field { flex: 1; min-width: 110px; }
  .mini-field label { font-size: 11px; }
  .mini-field input { padding: 5px 9px; font-size: 13px; }

  .gen-btn {
    width: 100%; padding: 13px;
    background: var(--green); color: white;
    border: none; border-radius: var(--radius-sm);
    font-size: 15px; font-weight: 600;
    cursor: pointer; transition: background 0.15s;
    margin-top: 4px;
  }
  .gen-btn:hover { background: #085041; }
  .gen-btn:disabled { background: #ccc; cursor: not-allowed; }

  /* ── PDF PREVIEW ─────────────────────────────────────── */

  .preview-wrap {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-top: 20px;
  }

  .preview-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 18px;
    background: #f0f0ec;
    border-bottom: 1px solid var(--border);
  }

  .preview-label { font-size: 12px; color: var(--text-muted); font-weight: 500; }

  .print-btn {
    display: flex; align-items: center; gap: 7px;
    padding: 7px 18px;
    background: var(--green); color: white;
    border: none; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 500; cursor: pointer;
  }
  .print-btn:hover { background: #085041; }

  .pdf {
    padding: 36px 40px;
    font-size: 13px;
    line-height: 1.65;
  }

  .pdf-header {
    border-bottom: 2.5px solid var(--green);
    padding-bottom: 16px;
    margin-bottom: 26px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .pdf-title { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
  .pdf-sub { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

  .pdf-meta { text-align: right; }
  .pdf-meta-item { font-size: 12px; color: var(--text-muted); line-height: 1.9; }
  .pdf-meta-item strong { color: var(--text); }

  .deadline-badge {
    display: inline-block;
    background: #FFF3CD;
    color: #856404;
    border: 1px solid #FFDA6A;
    border-radius: 4px;
    padding: 2px 9px;
    font-size: 12px;
    font-weight: 600;
    margin-top: 4px;
  }

  .ch-block {
    margin-bottom: 24px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
  }

  .ch-block-head {
    padding: 10px 16px;
    display: flex; align-items: center; gap: 10px;
    font-size: 14px; font-weight: 600;
    border-bottom: 1px solid var(--border);
  }

  .ch-block-sub { font-size: 12px; color: var(--text-muted); font-weight: 400; }
  .ch-block-body { padding: 16px 18px; }

  .spec-group { margin-bottom: 18px; }
  .spec-group:last-child { margin-bottom: 0; }

  .spec-group-title {
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
    padding-bottom: 5px;
    border-bottom: 1px solid var(--border);
  }

  .spec-tbl { width: 100%; border-collapse: collapse; }
  .spec-tbl td { padding: 4px 0; vertical-align: top; font-size: 13px; }
  .spec-tbl td:first-child { color: var(--text-muted); width: 42%; padding-right: 12px; }
  .spec-tbl td:last-child { font-weight: 500; color: var(--text); }

  .safezone-box {
    background: #f0faf6;
    border-left: 3px solid var(--green-mid);
    padding: 8px 12px;
    border-radius: 0 4px 4px 0;
    font-size: 12px;
    color: #2d6a55;
    margin-top: 8px;
  }
  .safezone-box a { color: var(--green); text-decoration: none; font-weight: 500; }
  .safezone-box a:hover { text-decoration: underline; }

  .open-box {
    background: #fffbf0;
    border: 1px solid #FFDA6A;
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    margin-top: 24px;
  }
  .open-box-title { font-size: 12px; font-weight: 700; color: #856404; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.06em; }
  .open-item { font-size: 12px; color: #5a4a00; padding: 3px 0; display: flex; gap: 8px; }
  .open-item::before { content: "→"; color: var(--green); flex-shrink: 0; }

  .pdf-footer {
    margin-top: 30px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-between;
    font-size: 11px; color: #aaa;
  }

  @media print {
    body { background: white; }
    header, .preview-bar, .main > *:not(.preview-wrap) { display: none !important; }
    .preview-wrap { border: none; margin: 0; }
    .pdf { padding: 20px; }
    .ch-block { break-inside: avoid; }
  }
</style>
</head>

    </div>
    <div class="grid-3">

      <div><label>Til produksjonsbyrå</label><input id="f-agency" placeholder="f.eks. Bacon & Co." oninput="upd()"></div>
      <div><label>Kontaktperson</label><input id="f-contact" placeholder="Navn, e-post" oninput="upd()"></div>
    </div>
  </div>

  <div class="card">
    <div class="section-label">Velg kanaler</div>
    <div class="channel-grid" id="ch-grid"></div>
  </div>

  <div class="card" id="config-card" style="display:none">
    <div class="section-label">Konfigurer valgte kanaler</div>
    <div id="config-list"></div>
  </div>

  <button class="gen-btn" id="gen-btn" disabled onclick="generate()">Generer materiellspesifikasjon</button>

  <div id="preview-area"></div>
</div>

let sel = {};

function upd() { renderConfigAndBtn(); }

function toggleCh(id) {
  if (sel[id]) {
    delete sel[id];
  } else {
    const ch = CHANNELS.find(c=>c.id===id);
    sel[id] = { types: ch.hasVideo ? ['video'] : ['image'], count:'', ordernr:'', notes:'' };
  }
  renderGrid();
  renderConfigAndBtn();
}

function toggleType(id, t) {
  const types = sel[id].types;
  const i = types.indexOf(t);
  if (i>=0) { if(types.length===1) return; sel[id].types = types.filter(x=>x!==t); }
  else sel[id].types = [...types, t];
  renderConfigAndBtn();
}

function setCf(id, field, val) { sel[id][field]=val; renderConfigAndBtn(); }

function renderGrid() {
  document.getElementById('ch-grid').innerHTML = CHANNELS.map(ch=>`
    <div class="ch-card ${sel[ch.id]?'active':''}" onclick="toggleCh('${ch.id}')">
      <div class="ch-check">✓</div>
      <div class="ch-name"><span class="ch-dot" style="background:${ch.color}"></span>${ch.name}</div>
      <div class="ch-sub">${ch.sub}</div>
    </div>`).join('');
}

function renderConfigAndBtn() {
  const ids = Object.keys(sel);
  const card = document.getElementById('config-card');
  const btn = document.getElementById('gen-btn');

  if (ids.length===0) { card.style.display='none'; btn.disabled=true; return; }
  card.style.display='block';
  btn.disabled=false;

  document.getElementById('config-list').innerHTML = ids.map(id=>{
    const ch = CHANNELS.find(c=>c.id===id);
    const cfg = sel[id];
    return `<div class="config-block">
      <div class="config-head">
        <div class="config-name">
          <span style="width:10px;height:10px;border-radius:50%;background:${ch.color};display:inline-block"></span>
          ${ch.name}
        </div>
        <button class="remove-btn" onclick="toggleCh('${id}')">Fjern</button>
      </div>
      <div class="config-body">
        ${ch.hasImage&&ch.hasVideo?`
        <div style="margin-bottom:10px">
          <label style="margin-bottom:6px">Kreativtype</label>
          <div class="type-toggles">
            <button class="type-btn ${cfg.types.includes('image')?'on':''}" onclick="toggleType('${id}','image')">Bilde</button>
            <button class="type-btn ${cfg.types.includes('video')?'on':''}" onclick="toggleType('${id}','video')">Film / Video</button>
          </div>
        </div>`:''}
        <div class="mini-row">
          <div class="mini-field"><label>Antall kreativer</label><input value="${cfg.count}" placeholder="f.eks. 3" oninput="setCf('${id}','count',this.value)"></div>
          ${ch.isBauer?`<div class="mini-field"><label>Ordrenummer</label><input value="${cfg.ordernr}" placeholder="Bauer-ordrenr." oninput="setCf('${id}','ordernr',this.value)"></div>`:''}
          <div class="mini-field" style="flex:2"><label>Merknad</label><input value="${cfg.notes}" placeholder="Særlige krav, varianter..." oninput="setCf('${id}','notes',this.value)"></div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function specRows(obj) {
  return Object.entries(obj).map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join('');
}

function now() {
  return new Date().toLocaleDateString('nb-NO',{day:'2-digit',month:'long',year:'numeric'});
}

function getOpenItems() {
  const items = [];
  const ids = Object.keys(sel);
  if (ids.includes('meta')) items.push('Meta: Bekreft antall kreativer per format (min 3 anbefalt for Advantage+)');
  if (ids.includes('bauer') && !sel['bauer'].ordernr) items.push('Bauer Media: Ordrenummer mangler – påkrevd for direkteleveranse');
  if (ids.includes('display')) items.push('Display: Avklar om mp4 leveres via 3. part, og om fallback er jpg eller mp4');
  if (ids.includes('vgtv')) items.push('VGTV: Bekreft at VAST-tag er satt opp uten VPAID');
  if (ids.includes('azerion')) items.push('Azerion: Velg leveringsmetode – VAST-tag eller videofil + click URL');
  if (ids.some(id=>['meta','tiktok','snapchat'].includes(id))) items.push('Postetekster: Avklar om produksjonsbyrå eller Moodgruppen/klient leverer tekster');
  return items;
}

function buildPDF() {
  const ids = Object.keys(sel);
  const client = document.getElementById('f-client').value;
  const campaign = document.getElementById('f-campaign').value;
  const deadline = document.getElementById('f-deadline').value;
  const agency = document.getElementById('f-agency').value;
  const contact = document.getElementById('f-contact').value;

  const blocks = ids.map(id=>{
    const ch = CHANNELS.find(c=>c.id===id);
    const cfg = sel[id];
    let sections = '';

    cfg.types.forEach(t=>{
      const specs = ch.specs[t];
      if (!specs) return;
      const label = t==='image' ? 'Bilde' : 'Film / Video';
      sections += `
        <div class="spec-group">
          <div class="spec-group-title">${label}</div>
          <table class="spec-tbl">
            ${specRows(specs)}
            ${cfg.count?`<tr><td>Antall kreativer</td><td>${cfg.count}</td></tr>`:''}
          </table>
          ${ch.safezones&&ch.safezones[t]?`
          <div class="safezone-box">
            <strong>Safezone:</strong> ${ch.safezones[t]}
            ${ch.safezones.link?` &nbsp;→ <a href="${ch.safezones.link}" target="_blank">${ch.safezones.label}</a>`:''}
          </div>`:''}
        </div>`;
    });

    if (ch.postetekst) {
      sections += `
        <div class="spec-group">
          <div class="spec-group-title">Postetekst</div>
          <table class="spec-tbl">${specRows(ch.postetekst)}</table>
        </div>`;
    }

    const leveranseVal = ch.isBauer && cfg.ordernr
      ? `${ch.leveranse}<br><strong>Ordrenummer: ${cfg.ordernr}</strong>`
      : ch.leveranse;

    sections += `
      <div class="spec-group">
        <div class="spec-group-title">Leveranse</div>
        <table class="spec-tbl">
          <tr><td>Leveres til</td><td>${leveranseVal}</td></tr>
          ${deadline?`<tr><td>Deadline</td><td style="color:#0F6E56;font-weight:700">${deadline}</td></tr>`:''}
          ${cfg.notes?`<tr><td>Merknad</td><td>${cfg.notes}</td></tr>`:''}
        </table>
      </div>`;

    return `
      <div class="ch-block">
        <div class="ch-block-head" style="background:${ch.color}18;border-left:3px solid ${ch.color}">
          <span style="width:11px;height:11px;border-radius:50%;background:${ch.color};display:inline-block"></span>
          ${ch.name}
          <span class="ch-block-sub">– ${ch.sub}</span>
        </div>
        <div class="ch-block-body">${sections}</div>
      </div>`;
  }).join('');

  const openItems = getOpenItems();

  return `
    <div class="pdf">
      <div class="pdf-header">
        <div>
          <div class="pdf-title">Materiellspesifikasjon</div>
          <div class="pdf-sub">${campaign||'–'}</div>
          ${deadline?`<div class="deadline-badge">Deadline: ${deadline}</div>`:''}
        </div>
        <div class="pdf-meta">
          ${client?`<div class="pdf-meta-item"><strong>Klient:</strong> ${client}</div>`:''}
          ${agency?`<div class="pdf-meta-item"><strong>Til:</strong> ${agency}</div>`:''}
          ${contact?`<div class="pdf-meta-item"><strong>Kontakt:</strong> ${contact}</div>`:''}
          <div class="pdf-meta-item"><strong>Fra:</strong> Moodgruppen</div>
          <div class="pdf-meta-item">${now()}</div>
        </div>
      </div>

      ${blocks}

      ${openItems.length>0?`
      <div class="open-box">
        <div class="open-box-title">Åpne punkter for avklaring</div>
        ${openItems.map(i=>`<div class="open-item">${i}</div>`).join('')}
      </div>`:''}

      <div class="pdf-footer">
        <span>Moodgruppen AS · Materiellspesifikasjon</span>
        <span>Safezones hentet fra offisielle plattformkilder · ${now()}</span>
      </div>
    </div>`;
}

function generate() {
  const area = document.getElementById('preview-area');
  area.innerHTML = `
    <div class="preview-wrap">
      <div class="preview-bar">
        <span class="preview-label">Forhåndsvisning</span>
        <button class="print-btn" onclick="window.print()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 6 2 18 2 18 9"/>
            <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
            <rect x="6" y="14" width="12" height="8"/>
          </svg>
          Skriv ut / Lagre PDF
        </button>
      </div>
      ${buildPDF()}
    </div>`;
  area.scrollIntoView({behavior:'smooth', block:'start'});
}

renderGrid();
</script>
</body>
</html>
